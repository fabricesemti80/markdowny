name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || !inputs.skip_tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: sudo apt-get install -y libcairo2-dev pkg-config
      
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest || echo "No tests found"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: sudo apt-get install -y libcairo2-dev pkg-config
      
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      
      - run: uv build
      
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Get latest tag
        id: tag
        run: |
          git fetch --tags --force
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "No tags found. Push a tag (e.g., v0.1.0) to trigger release."
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  demo:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get install -y libcairo2-dev pkg-config

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dfx
        run: uv tool install --python 3.12 .

      - name: Install VHS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          curl -fsSL https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64 -o /usr/local/bin/ttyd
          chmod +x /usr/local/bin/ttyd

      - name: Install VHS
        run: |
          go install github.com/charmbracelet/vhs@latest
        env:
          GOPATH: /home/runner/go
          PATH: /home/runner/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

      - name: Generate demo GIF
        run: /home/runner/go/bin/vhs demo/demo.tape

      - name: Commit demo GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add demo.gif
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update demo GIF [skip ci]"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
