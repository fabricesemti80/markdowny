name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: astral-sh/uv-action@v1
        with:
          enable-cache: true
      
      - run: uv sync
      
      - run: uv run pytest || echo "No tests found"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: astral-sh/uv-action@v1
        with:
          enable-cache: true
      
      - run: uv sync --extra lint
      
      - name: Check Ruff
        run: uv run ruff check .
      
      - name: Check types
        run: uv run ruff check --select=FA --show-source . || uv run mypy . || echo "No type checking configured"
