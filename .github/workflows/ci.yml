name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: sudo apt-get install -y libcairo2-dev pkg-config
      
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      
      - run: uv sync
      
      - run: uv run pytest || echo "No tests found"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: sudo apt-get install -y libcairo2-dev pkg-config
      
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      
      - run: uv sync --extra lint
      
      - name: Check Ruff
        run: uv run ruff check .
